<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Layouts 2</title>
    <link rel="stylesheet" href="headersDom.css">
</head>
<!-- Header 1 -->

<body>
    <header>
        <div class="header-block">
            <div class="logo">
                <img src="Logoipsum.svg" alt="logo" />


            </div>



            <div class="loupe">
                <img src="search-lg.svg" alt="logo" width="16" height="16" />
                <input type="text" placeholder="Search" />

            </div>


        </div>


        <nav class="nav">
            <a href="#" class="active">Products</a>
            <a href="#">Services</a>
            <a href="#">Expertise</a>
            <a href="#">About</a>
            <div href="#" id="button">Login/Signup</div>
        </nav>





    </header>



    <!--Header 2-->

    <header>

        <div class="header-block2">

            <div class="flower">
                <img src="Wood.svg" alt="logo" width="40" height="40">

            </div>

            <nav class="nav2">
                <a href="#" class="active">Home</a>
                <a href="#">About</a>
                <a href="#">Market</a>
                <a href="#">Services</a>
                <a href="#">Blog</a>
            </nav>

        </div>


        <div class="threeButtons">
            <img src="Buttons.png" class="first" alt="logo" width="40" height="40">
            <img src="middleButton.svg" class="middle" alt="logo" width="40" height="40">
            <div class="blueButton">Sign In</div>
        </div>

    </header>



    <!--Header 3-->

    <header>
        <div class="header-block3">
            <div class="coloredLogo">
                <img src="assets/ThisIsMyLogo.svg">
            </div>
        </div>

        <nav class="nav3">
            <a href="#">About</a>
            <a href="#">Features</a>
            <a href="#">Pricing</a>
            <a href="#">Gallery</a>
            <a href="#">Team</a>
        </nav>

        <div class="blackLoupe">
            <img src="Right.svg" alt="logo">
        </div>

    </header>


    <!--Header 4-->
    <!-- <header> -->
    <div class="header-block4">


        <div class="coloredLogo">
            <img src="Left.svg">
        </div>



        <nav class="nav4">
            <a href="#">About</a>
            <a href="#">Features</a>
            <a href="#">Pricing</a>
            <a href="#">Gallery</a>
            <a href="#">Team</a>
        </nav>
    </div>

    <!-- <p></p> -->
    <!-- </header> -->



    <!--Header 5-->

    <div class="header-block5">


        <div class="coloredLogo">
            <img src="Logo.svg">
        </div>

        <div class="lastInput">
            <input type="text" placeholder="Search.." />
            <img src="Icon (1).svg" alt="logo">

        </div>

        <!-- <div class="Icon">
            
        </div> -->

        <nav class="nav5">
            <a href="#">About</a>
            <a href="#">Features</a>
            <a href="#">Pricing</a>
            <a href="#">Gallery</a>
            <a href="#">Team</a>
        </nav>

    </div>







</body>

</html>
