<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>                         <!--перечисляю элементы без определенного порядка помечая маркером(жирной точкой)-->
       <li>Basketball</li>
       <li>Tomato</li>
       <li>Lemon</li>             <!--Создаю элементы с помощью <li>-->
       <li>Banana</li>
       <li>Cucumber</li>
       
   </ul>

   <ol>                            <!--перечисляю элементы с определенным порядком нумеруя каждый элемент автоматически-->
       <li>Взять мяч</li>
       <li>Подготовить тело к броску</li>
       <li>Выбросить по кольцу</li>
       <li>Бежать на подбор</li>
       <li>Взять мяч и повторить процесс</li>

   </ol>

   <table border="1">    <!--Создаю таблицу(основной контейнер для таблицы) организованную в строки и столбцы-->  
 
       <tr>                <!--Строка таблицы-->
          <th>Имя</th>
          <th>Возраст</th>  <!--Заголовочная ячейка таблицы-->
          <th>Город</th>  
       </tr>

       <tr>
          <td>Рина</td>     <!--Ячейка таблицы-->
          <td>26</td>
          <td>Алматы</td>
       </tr>

       <tr>
           <td>John</td>
           <td>28</td>
           <td>New York</td>
       </tr>

       <tr>
          <td>Paris</td>
          <td>36</td>
          <td>London</td>
       </tr>



   </table>


</body>
</html>
