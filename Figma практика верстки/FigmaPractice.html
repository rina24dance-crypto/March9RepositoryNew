<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast landing page</title>
    <link rel="stylesheet" href="FigmaPractice.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="Assets 4/Vector.svg" class="img1" alt="logo image">
            </div>
            <ul class="menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Episodes</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>



            </ul>
        </nav>
    </header>


    <section class="hero">
        <div class="image">
            <img src="Assets 4/Frame.svg" alt="main image">
        </div>

        <div class="content">
            <h2>Take your <br> podcast to the <span>next <b>level</b></span></h2>
            <p>Listen on</p>
            <div class="platforms">
                <img class="icons" src="Assets 4/greenIcon.svg" alt="musical platforms">
                <img class="icons" src="Assets 4/redIcon.svg">
                <img class="icons" src="Assets 4/orangeIcon.svg">
                <img class="icons" src="Assets 4/violetIcon.svg">
                <img class="icons" src="Assets 4/whiteIcon.svg">
            </div>
        </div>
    </section>
</body>

</html>
